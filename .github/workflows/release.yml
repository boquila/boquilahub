name: Release
on:
  release:
    types: [published]
  workflow_dispatch:
permissions:
  contents: write
jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        variant: [webgpu, cuda]
        os: [windows-latest, ubuntu-22.04, macos-14]
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: boquilahub.exe
            platform: windows
            ext: 7z
            arch: x86_64
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            artifact: boquilahub
            platform: linux
            ext: tar.gz
            arch: x86_64
          - os: macos-14
            target: aarch64-apple-darwin
            artifact: boquilahub
            platform: macos
            ext: tar.gz
            arch: arm64
        exclude:
          - os: macos-14
            variant: cuda
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev \
            libxkbcommon-dev \
            libwayland-dev \
            libasound2-dev \
            p7zip-full

      - name: Install macOS dependencies
        if: runner.os == 'macOS'
        run: brew install ffmpeg dylibbundler

      - name: Fetch ffmpeg
        run: cargo xtask fetch

      - name: Set package name
        shell: bash
        run: echo "PKG=boquilahub-${{ matrix.platform }}-${{ matrix.arch }}-${{ matrix.variant }}.${{ matrix.ext }}" >> "$GITHUB_ENV"

      - name: Build release
        shell: bash
        run: |
          if [ "${{ runner.os }}" = "Linux" ]; then
            export RUSTFLAGS='-C link-arg=-Wl,-rpath,$ORIGIN'
          fi
          if [ "${{ runner.os }}" = "macOS" ]; then
            # ffmpeg-sys-next emits a GNU-only linker flag on the FFMPEG_DIR path
            # that Apple's ld rejects; route linking through a shim that drops it.
            chmod +x .github/macos-cc-shim.sh
            export CARGO_TARGET_AARCH64_APPLE_DARWIN_LINKER="$PWD/.github/macos-cc-shim.sh"
          fi
          if [ "${{ matrix.variant }}" = "cuda" ]; then
            cargo build --release --no-default-features --features cuda
          else
            cargo build --release
          fi

      - name: Smoke test - pull models
        shell: bash
        run: |
          ./target/release/${{ matrix.artifact }} pull SpeciesNetv4.0.0a
          ./target/release/${{ matrix.artifact }} pull boquilanet-gen

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          mkdir pkg
          cp target/release/${{ matrix.artifact }} pkg/
          cp -Recurse target/release/assets pkg/assets
          cp target/release/*.dll pkg/
          cp -Recurse models pkg/models
          7z a $env:PKG ./pkg/*

      - name: Package (Linux)
        if: runner.os == 'Linux'
        run: |
          mkdir pkg
          cp target/release/${{ matrix.artifact }} pkg/
          cp -r target/release/assets pkg/assets
          chmod +x pkg/${{ matrix.artifact }}
          # ffmpeg + ONNX Runtime / WebGPU libs were placed next to the binary at build time.
          cp -a target/release/*.so* pkg/
          cp -a /usr/lib/x86_64-linux-gnu/libasound.so* pkg/
          cp -r models pkg/models
          tar czf "$PKG" -C pkg .

      - name: Package (macOS)
        if: runner.os == 'macOS'
        run: |
          # Bundle ffmpeg + its Homebrew dependency tree next to the binary and
          # rewrite their load paths to @executable_path so the archive runs on a
          # clean Mac. Run in target/release, where ort already placed the ONNX
          # Runtime dylib beside the binary, so dylibbundler can resolve it too.
          dylibbundler -of -b -x target/release/${{ matrix.artifact }} \
            -d target/release -p @executable_path/ -s target/release
          mkdir pkg
          cp target/release/${{ matrix.artifact }} pkg/
          cp target/release/*.dylib pkg/
          cp -R target/release/assets pkg/assets
          cp -r models pkg/models
          # dylibbundler's load-path rewrites invalidate code signatures; Apple
          # Silicon refuses to load unsigned/broken Mach-O, so re-sign ad-hoc.
          find pkg -name '*.dylib' -exec codesign --force --sign - {} +
          codesign --force --sign - pkg/${{ matrix.artifact }}
          chmod +x pkg/${{ matrix.artifact }}
          tar czf "$PKG" -C pkg .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PKG }}
          path: ${{ env.PKG }}

      - name: Attach to GitHub Release
        if: github.event_name == 'release'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ github.event.release.tag_name }}" "${{ env.PKG }}" --clobber
