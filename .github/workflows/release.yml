name: Release
on:
  release:
    types: [published]
  workflow_dispatch:
permissions:
  contents: write
jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        variant: [webgpu, cuda]
        os: [windows-latest, ubuntu-22.04]
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: boquilahub.exe
            platform: windows
            ext: 7z
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            artifact: boquilahub
            platform: linux
            ext: tar.gz
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev \
            libxkbcommon-dev \
            libwayland-dev \
            libasound2-dev \
            p7zip-full

      - name: Fetch ffmpeg
        run: cargo xtask fetch

      - name: Set package name
        shell: bash
        run: echo "PKG=boquilahub-${{ matrix.platform }}-x86_64-${{ matrix.variant }}.${{ matrix.ext }}" >> "$GITHUB_ENV"

      - name: Build release
        shell: bash
        run: |
          if [ "${{ runner.os }}" = "Linux" ]; then
            export RUSTFLAGS='-C link-arg=-Wl,-rpath,$ORIGIN'
          fi
          if [ "${{ matrix.variant }}" = "cuda" ]; then
            cargo build --release --no-default-features --features cuda
          else
            cargo build --release
          fi

      - name: Smoke test - pull models
        shell: bash
        run: |
          ./target/release/${{ matrix.artifact }} pull SpeciesNetv4.0.0a
          ./target/release/${{ matrix.artifact }} pull boquilanet-gen

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          mkdir pkg
          cp target/release/${{ matrix.artifact }} pkg/
          cp -Recurse target/release/assets pkg/assets
          cp target/release/*.dll pkg/
          cp -Recurse models pkg/models
          7z a $env:PKG ./pkg/*

      - name: Package (Linux)
        if: runner.os == 'Linux'
        run: |
          mkdir pkg
          cp target/release/${{ matrix.artifact }} pkg/
          cp -r target/release/assets pkg/assets
          chmod +x pkg/${{ matrix.artifact }}
          # ffmpeg + ONNX Runtime / WebGPU libs were placed next to the binary at build time.
          cp -a target/release/*.so* pkg/
          cp -a /usr/lib/x86_64-linux-gnu/libasound.so* pkg/
          cp -r models pkg/models
          tar czf "$PKG" -C pkg .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PKG }}
          path: ${{ env.PKG }}

      - name: Attach to GitHub Release
        if: github.event_name == 'release'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ github.event.release.tag_name }}" "${{ env.PKG }}" --clobber
