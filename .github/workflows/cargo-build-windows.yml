name: Build and Test Run on Windows

on:
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-and-run:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Test
        run: cargo test -- --nocapture

      - name: Run for at least 10 seconds
        shell: pwsh
        run: |
          $proc = Start-Process -NoNewWindow -FilePath cargo -ArgumentList "run" -PassThru
          Start-Sleep -Seconds 10
          if ($proc.HasExited) {
            exit $proc.ExitCode
          }
          Stop-Process -Id $proc.Id -Force
